<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arush's Study Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; display: flex; flex-direction: column;
           align-items: center; justify-content: flex-start; min-height: 100vh;
           background: #0f0f0f; color: white; margin: 0; padding: 40px 20px; gap: 10px; }
    .big { font-size: 5rem; font-weight: bold; }
    .red { color: #ff4444; }
    .green { color: #44ff88; }
    .label { color: #aaa; margin-top: -8px; font-size: 1.1rem; }
    .bar-wrap { width: 320px; background: #222; border-radius: 20px; height: 14px; margin: 10px 0; }
    .bar-fill { height: 14px; border-radius: 20px; background: #44ff88; transition: width 0.6s ease; }
    .stats-row { display: flex; gap: 40px; margin-top: 10px; }
    .stat { text-align: center; }
    .stat .num { font-size: 2.5rem; font-weight: bold; }
    .sub { color: #555; font-size: 0.85rem; }
    a { color: #777; }
    .sessions { width: 340px; margin-top: 20px; }
    .session-item { background: #1a1a1a; border-radius: 8px; padding: 10px 14px;
                    margin-bottom: 6px; font-size: 0.9rem; color: #ccc;
                    display: flex; justify-content: space-between; }
    .session-hrs { color: #44ff88; font-weight: bold; white-space: nowrap; margin-left: 10px; }
    #admin-panel { display: none; margin-top: 30px; background: #1a1a1a;
                   border: 1px solid #333; border-radius: 12px; padding: 24px; width: 340px; }
    #admin-panel h3 { margin: 0 0 16px; color: #aaa; font-size: 0.95rem;
                      text-transform: uppercase; letter-spacing: 1px; }
    #admin-panel input { width: 100%; background: #111; border: 1px solid #333; border-radius: 8px;
                         color: white; padding: 10px 12px; font-size: 0.95rem;
                         margin-bottom: 10px; outline: none; font-family: sans-serif; }
    #admin-panel input:focus { border-color: #555; }
    #admin-panel button { width: 100%; background: #44ff88; color: #000; font-weight: bold;
                          border: none; border-radius: 8px; padding: 12px; font-size: 1rem;
                          cursor: pointer; margin-top: 4px; }
    #admin-panel button:hover { background: #33dd77; }
    #admin-panel button:disabled { background: #333; color: #666; cursor: not-allowed; }
    #status { font-size: 0.85rem; margin-top: 8px; text-align: center; color: #aaa; min-height: 20px; }
    #setup-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
                   align-items: center; justify-content: center; z-index: 100; }
    #setup-modal.show { display: flex; }
    #setup-box { background: #1a1a1a; border-radius: 12px; padding: 28px;
                 width: 320px; display: flex; flex-direction: column; gap: 10px; }
    #setup-box h3 { margin: 0; color: #aaa; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    #setup-box input { background: #111; border: 1px solid #333; border-radius: 8px;
                       color: white; padding: 10px 12px; font-size: 0.9rem;
                       outline: none; width: 100%; }
    #setup-box button { background: #44ff88; color: #000; font-weight: bold;
                        border: none; border-radius: 8px; padding: 10px; font-size: 0.95rem; cursor: pointer; }
    #setup-box p { color: #555; font-size: 0.8rem; margin: 0; }
  </style>
</head>
<body>

  <div class="big red" id="remaining">...</div>
  <div class="label">hours remaining</div>

  <div class="bar-wrap"><div class="bar-fill" id="bar" style="width:0%"></div></div>

  <div class="stats-row">
    <div class="stat"><div class="num red" id="owed">–</div><div class="label" style="font-size:0.9rem">hours owed</div></div>
    <div class="stat"><div class="num green" id="done">–</div><div class="label" style="font-size:0.9rem">hours done</div></div>
  </div>

  <div class="sub" id="likes" style="margin-top:14px;"></div>
  <div class="sub"><a href="https://www.youtube.com/watch?v=z_BX6blB_iU&lc=Ugz-O4GSgfsDB0-tRid4AaABAg" target="_blank">based on this comment</a> · 3 hrs per like</div>

  <div class="sessions">
    <div style="color:#555; font-size:0.8rem; margin-bottom:8px;" id="sessions-label"></div>
    <div id="sessions-list"></div>
  </div>

  <div id="admin-panel">
    <h3>🔒 Log a Session</h3>
    <input type="text" id="inp-topic" placeholder="What did you study?" maxlength="80" />
    <input type="number" id="inp-hours" placeholder="Hours spent" min="0.5" max="24" step="0.5" />
    <button id="submit-btn" onclick="logSession()">Add Session</button>
    <div id="status"></div>
    <div style="margin-top:14px; font-size:0.75rem; color:#444; text-align:center; cursor:pointer"
         onclick="clearSetup()">Reset credentials</div>
  </div>

  <div id="setup-modal">
    <div id="setup-box">
      <h3>⚙️ One-time Setup</h3>
      <p>Saved only in your browser — never sent anywhere.</p>
      <input id="s-token" type="password" placeholder="GitHub Personal Access Token" />
      <input id="s-owner" type="text" placeholder="GitHub username" />
      <input id="s-repo"  type="text" placeholder="Repository name (study-tracker)" />
      <input id="s-pass"  type="password" placeholder="Admin password (your choice)" />
      <button onclick="saveSetup()">Save & Continue</button>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://study-tracker-likes.mangalarush.workers.dev/";
    const GH_OWNER   = "arushmangal";
    const GH_REPO    = "study-tracker";

    const ADMIN_SHORTCUT = new Set(["A", "D"]);
    let held = new Set();
    document.addEventListener("keydown", e => {
      if (e.shiftKey) held.add(e.key.toUpperCase());
      if ([...ADMIN_SHORTCUT].every(k => held.has(k))) toggleAdmin();
    });
    document.addEventListener("keyup", () => held.clear());

    function getSetup() {
      return {
        token: localStorage.getItem("gh_token"),
        owner: localStorage.getItem("gh_owner"),
        repo:  localStorage.getItem("gh_repo"),
        pass:  localStorage.getItem("gh_pass"),
      };
    }

    function toggleAdmin() {
      const { token, owner, repo } = getSetup();
      if (!token || !owner || !repo) {
        document.getElementById("setup-modal").classList.add("show");
        return;
      }
      const input = prompt("Admin password:");
      if (input !== getSetup().pass) return alert("Wrong password.");
      const panel = document.getElementById("admin-panel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    }

    function saveSetup() {
      const t = document.getElementById("s-token").value.trim();
      const o = document.getElementById("s-owner").value.trim();
      const r = document.getElementById("s-repo").value.trim();
      const p = document.getElementById("s-pass").value.trim();
      if (!t || !o || !r || !p) return alert("Fill in all fields.");
      localStorage.setItem("gh_token", t);
      localStorage.setItem("gh_owner", o);
      localStorage.setItem("gh_repo",  r);
      localStorage.setItem("gh_pass",  p);
      document.getElementById("setup-modal").classList.remove("show");
      document.getElementById("admin-panel").style.display = "block";
    }

    function clearSetup() {
      ["gh_token","gh_owner","gh_repo","gh_pass"].forEach(k => localStorage.removeItem(k));
      document.getElementById("admin-panel").style.display = "none";
      alert("Credentials cleared.");
    }

    async function logSession() {
      const topic = document.getElementById("inp-topic").value.trim();
      const hours = parseFloat(document.getElementById("inp-hours").value);
      if (!topic || !hours || hours <= 0) return setStatus("Fill in both fields.");

      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      setStatus("Saving...");

      const { token, owner, repo } = getSetup();
      const apiBase = `https://api.github.com/repos/${owner}/${repo}/contents/data.json`;

      try {
        const res     = await fetch(apiBase, { headers: { Authorization: `token ${token}` }});
        const meta    = await res.json();
        const current = JSON.parse(atob(meta.content));

        current.hoursCompleted = (current.hoursCompleted || 0) + hours;
        current.sessions.push({
          date:  new Date().toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" }),
          topic,
          hours
        });

        await fetch(apiBase, {
          method: "PUT",
          headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({
            message: `log: ${hours}h — ${topic}`,
            content: btoa(JSON.stringify(current, null, 2)),
            sha: meta.sha
          })
        });

        setStatus("✅ Session logged!");
        document.getElementById("inp-topic").value = "";
        document.getElementById("inp-hours").value = "";
        setTimeout(() => { loadData(); setStatus(""); }, 1500);
      } catch(e) {
        setStatus("❌ Error — check your token/repo.");
      }
      btn.disabled = false;
    }

    function setStatus(msg) { document.getElementById("status").textContent = msg; }

async function loadData() {
  const rawURL = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/data.json?t=${Date.now()}`;

  const [workerData, myData] = await Promise.all([
    fetch(WORKER_URL).then(r => r.json()),
    fetch(rawURL).then(r => r.json())
  ]);

  const likes     = workerData.likes      || 0;
  const done      = myData.hoursCompleted || 0;
  const owed      = likes * 3;
  const remaining = Math.max(0, owed - done);
  const pct       = owed > 0 ? Math.min(100, (done / owed) * 100) : 0;

  document.getElementById("remaining").textContent = remaining;
  document.getElementById("owed").textContent      = owed;
  document.getElementById("done").textContent      = done;
  document.getElementById("likes").textContent     = `${likes} likes × 3 hrs`;
  document.getElementById("bar").style.width       = pct + "%";

  const sessions = myData.sessions || [];
  if (sessions.length) {
    document.getElementById("sessions-label").textContent = "Recent sessions";
    document.getElementById("sessions-list").innerHTML =
      [...sessions].reverse().slice(0, 6).map(s =>
        `<div class="session-item">
           <span>📖 ${s.topic}</span>
           <span class="session-hrs">${s.hours}h · ${s.date}</span>
         </div>`
      ).join("");
  }
}

    loadData();
  </script>
</body>
</html>
